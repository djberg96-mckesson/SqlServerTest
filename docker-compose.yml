services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      SA_PASSWORD: "TestPassword123A#"
      MSSQL_SA_PASSWORD: "TestPassword123A#"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "TestPassword123A#", "-Q", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sqlserver_data:
